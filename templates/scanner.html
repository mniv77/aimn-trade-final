        </div>

            <div class="flex justify-between items-center mb-4">
                <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Active Orders</h3>

        <script>
// ==========================================
// 1. GLOBAL STATE & CONFIG
// ==========================================
let scannerData = [];
let currentFocusIndex = 0;
let rotationInterval = null;
let currentSpeed = 5000;

// ==========================================
// 2. DATA FETCH & RENDER (LEFT COLUMN)
// ==========================================
async function fetchData() {
    const API_URL = 'https://meirniv.pythonanywhere.com/get_active_strategies?cb=' + Date.now();

    try {
        const res = await fetch(API_URL);
        const data = await res.json();

        // DEBUG LOG: Press F12 to see this in your browser!
        console.log("📡 DATA FROM SERVER:", data);

        if (!data || data.length === 0) {
            console.warn("⚠️ Server returned an EMPTY list. Check your Python script/Database.");
            return;
        }

        scannerData = data;
        renderScanner();

        // Update the middle box with the currently focused symbol
        if (scannerData[currentFocusIndex]) {
            updateInspector(scannerData[currentFocusIndex]);
        }
    } catch (err) {
        console.error("❌ Connection Error:", err);
    }
}

function renderScanner() {
    const listContainer = document.getElementById('symbol-list');
    if (!listContainer) return;
    listContainer.innerHTML = '';

    scannerData.forEach((item, index) => {
        const isFocused = index === currentFocusIndex;
        const rowId = item.symbol.replace('/', '-').toUpperCase();

        // GET COLOR STATUS
        const colorStatus = item.color_status || 'GRAY';
        const statusLabel = item.status_label || 'UNKNOWN';

        // BORDER COLOR BASED ON STATUS
        let borderColor = 'border-slate-800';
        let bgOpacity = 'opacity-40';

        if (colorStatus === 'GREEN') {
            borderColor = 'border-green-500';
            bgOpacity = isFocused ? 'opacity-100' : 'opacity-70';
        } else if (colorStatus === 'RED') {
            borderColor = 'border-red-500';
            bgOpacity = 'opacity-100';
        } else if (colorStatus === 'BROWN') {
            borderColor = 'border-yellow-700';
            bgOpacity = 'opacity-50';
        } else if (colorStatus === 'YELLOW') {
            borderColor = 'border-yellow-500';
            bgOpacity = 'opacity-40';
        }

        const line = document.createElement('div');
        line.className = `p-3 border-b ${borderColor} border-l-4 flex justify-between items-center transition-all duration-500 ${bgOpacity} ${
            isFocused ? 'bg-blue-900/40' : 'bg-black/20'
        }`;

        const priceVal = parseFloat(item.last_price || 0);

        line.innerHTML = `
            <div class="flex items-center gap-3">
                <div class="w-1 h-6 ${isFocused ? 'bg-blue-400 animate-pulse' : 'bg-slate-800'} rounded-full"></div>
                <div>
                    <div class="text-[10px] font-black ${isFocused ? 'text-white' : 'text-slate-400'}">${item.symbol}</div>
                    <div class="text-[7px] text-slate-500 font-bold uppercase">
                        ${item.broker_name} | ${statusLabel}
                    </div>
                </div>
            </div>
            <div class="text-right">
                <div id="price-${rowId}" class="text-[11px] font-mono font-bold text-blue-400">
                    ${priceVal > 0 ? priceVal.toLocaleString() : '0.00'}
                </div>
                <div class="text-[7px] ${
                    colorStatus === 'GREEN' ? 'text-green-400' :
                    colorStatus === 'RED' ? 'text-red-400' :
                    colorStatus === 'BROWN' ? 'text-yellow-700' :
                    colorStatus === 'YELLOW' ? 'text-yellow-400' :
                    'text-slate-500'
                } uppercase font-bold tracking-widest">${colorStatus}</div>
            </div>
        `;

        listContainer.appendChild(line);

        if (isFocused) {
            line.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            updateInspector(item);
        }
    });
}

// ==========================================
// 3. INSPECTOR LOGIC (MIDDLE COLUMN)
// ==========================================
function updateInspector(item) {
    if (!item) return;

    // 1. PULL REAL DATA FROM YOUR NEW DB COLUMNS
    const liveRsi = parseFloat(item.rsi_real || 0);
    const tunedEntry = parseFloat(item.rsi_entry || 0);
    const macdVal = parseFloat(item.macd || 0);
    const mktPrice = parseFloat(item.last_price || 0);

    const brokerName = (item.broker || "GEMINI").toUpperCase();
    const signal = item.signal || 'LONG';

    // 2. UPDATE HEADER (Symbol & Broker)
    document.getElementById('active-symbol').innerText = item.symbol;
    document.getElementById('active-broker').innerText = brokerName;

    // 3. DIRECTION BADGE
    const dirBadge = document.getElementById('active-direction');
    dirBadge.innerText = `${signal} SETUP`;
    dirBadge.className = `px-4 py-2 rounded-lg text-sm font-black ${
        signal === 'LONG' ? 'bg-green-500 text-black' : 'bg-red-500 text-white'
    }`;

    // 4. THE LIVE RSI (The "History 14" Real Units)
    const rsiEl = document.getElementById('real-time-rsi');
    rsiEl.innerText = liveRsi.toFixed(2);

    // Logic: Pulse Green if your "Tight Tuning" target is hit
    const rsiReady = (signal === 'LONG' ? liveRsi <= tunedEntry : liveRsi >= tunedEntry);
    rsiEl.className = `text-6xl font-black ${rsiReady && liveRsi > 0 ? 'text-green-400 animate-pulse' : 'text-blue-400'}`;

    // 5. THE MACD WITH MOMENTUM ARROW
    const macdEl = document.getElementById('real-time-macd');
    const arrow = macdVal > 0 ? '↑' : '↓';
    const macdReady = (signal === 'LONG' ? macdVal > 0 : macdVal < 0);

    macdEl.innerHTML = `${arrow} <span class="text-3xl">${macdVal.toFixed(4)}</span>`;
    macdEl.className = `font-black ${macdReady ? 'text-green-500' : 'text-red-500'}`;

    // 6. BOTTOM STATUS (Market Price & Tuning Specs)
    const statusEl = document.getElementById('inspector-status');
    statusEl.innerHTML = `
        <div class="text-white font-mono text-lg mb-2">PRICE: $${mktPrice.toLocaleString()}</div>
        <div class="flex justify-center gap-4 text-[10px] text-slate-500 font-bold uppercase">
            <span>Entry Target: ${tunedEntry}</span>
            <span>Tuning: ${item.macd_fast}/${item.macd_slow}/${item.macd_sig}</span>
        </div>
    `;
}

// ==========================================
// LIVE PRICE ENGINE (WebSocket)
// ==========================================
function startLivePrices(data) {
    if (priceSocket) return; // Don't open multiple connections

    // Use a public price feed or your own PythonAnywhere socket
    // For this example, we'll use a standard crypto feed
    priceSocket = new WebSocket('wss://stream.binance.com:9443/ws');

    const streams = data.map(item => `${item.symbol.replace('/', '').toLowerCase()}@ticker`);

    priceSocket.onopen = () => {
        console.log("🔌 WebSocket Connected to Price Feed");
        priceSocket.send(JSON.stringify({
            method: "SUBSCRIBE",
            params: streams,
            id: 1
        }));
    };

    priceSocket.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        if (!msg.s) return; // Skip if no symbol data

        const ticker = msg.s; // e.g., BTCUSDT
        const currentPrice = parseFloat(msg.c);

        // 1. Update the Left Column Price
        // We match "BTCUSDT" back to "BTC-USD"
        const cleanTicker = ticker.replace('USDT', '-USD');
        const priceEl = document.getElementById(`price-${cleanTicker}`);

        if (priceEl) {
            const oldPrice = parseFloat(priceEl.innerText.replace(/,/g, '')) || 0;
            priceEl.innerText = currentPrice.toLocaleString();

            // Visual feedback: Green for up, Red for down
            priceEl.style.color = currentPrice > oldPrice ? '#4ade80' : '#f87171';
            setTimeout(() => priceEl.style.color = '#60a5fa', 400);
        }

        // 2. Update the Middle Column if it's the Focused Symbol
        const focusedItem = scannerData[currentFocusIndex];
        if (focusedItem && focusedItem.symbol.replace('/', '') === ticker.replace('USDT', 'USD')) {
            // Update the global object with the new price
            focusedItem.last_price = currentPrice;

            // Re-run the inspector logic to check RSI/MACD against new price
            updateInspector(focusedItem);
        }
    };

    priceSocket.onerror = (err) => console.error("WebSocket Error:", err);
    priceSocket.onclose = () => {
        console.log("🔌 Socket Closed. Reconnecting...");
        priceSocket = null;
        setTimeout(() => startLivePrices(scannerData), 5000);
    };
}


// ==========================================
// 4. SPEED & CONTROL
// ==========================================
function setScannerSpeed(ms) {
    currentSpeed = ms;
    // Visually update buttons
    document.querySelectorAll('.speed-btn').forEach(btn => {
        const isCurrent = btn.innerText.includes(ms/1000);
        btn.className = `speed-btn text-[7px] px-1.5 py-0.5 rounded ${isCurrent ? 'bg-blue-600 text-white font-bold' : 'bg-slate-800 text-slate-400'}`;
    });
    startRotation();
}

function startRotation() {
    clearInterval(rotationTimer);
    rotationTimer = setInterval(() => {
        if (rotationEnabled && scannerData.length > 0) {
            let attempts = 0;
            const maxAttempts = scannerData.length;

            // Keep advancing until we find a GREEN strategy or we've checked all
            do {
                currentFocusIndex = (currentFocusIndex + 1) % scannerData.length;
                attempts++;

                const item = scannerData[currentFocusIndex];
                if (!item) break;

                // Check if this strategy is GREEN (ready to trade)
                const firstActivePerBroker = getFirstActivePerBroker();
                const status = getBrokerStatus(item, firstActivePerBroker);

                if (status.color === 'green') {
                    // Found a GREEN one - stop here
                    break;
                }

            } while (attempts < maxAttempts);

            renderScanner();
            updateMonitor();
        }
    }, rotationSeconds * 1000);
}

// Helper function to calculate first active per broker
function getFirstActivePerBroker() {
    const firstActivePerBroker = new Map();
    scannerData.forEach(item => {
        const broker = item.broker_name;
        const hasMatch = item.rsi_ready && item.macd_ready;
        if (hasMatch && !firstActivePerBroker.has(broker)) {
            firstActivePerBroker.set(broker, item.id);
        }
    });
    return firstActivePerBroker;
}

// ==========================================
// 5. BOOTSTRAP
// ==========================================
function initScanner() {
    fetchData(); // Initial load

    // Refresh the DB data every 3 seconds to make numbers "Live"
    setInterval(fetchData, 3000);

    // Start the automatic rotation of the scanner
    startRotation();
}

initScanner();
</script>
