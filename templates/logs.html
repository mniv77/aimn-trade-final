<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="5"> <title>Live Scanner Logs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-black text-gray-200 font-mono p-6">

    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-6 border-b border-gray-800 pb-4">
            <h1 class="text-2xl font-bold text-green-500">
                <i class="fas fa-terminal mr-2"></i> SYSTEM LIVE LOGS
            </h1>
            <div class="space-x-4">
                <a href="/" class="text-gray-500 hover:text-white">Dashboard</a>
                <a href="/clear_logs" class="text-red-500 hover:text-red-400 text-sm border border-red-900 px-3 py-1 rounded">Clear Logs</a>
            </div>
        </div>

        <div class="space-y-2">
            {% if logs %}
                {% for log in logs %}
                <div class="flex items-start gap-4 p-2 rounded hover:bg-gray-900 border-l-2 
                    {% if log.level == 'ERROR' %} border-red-500 bg-red-900/10 text-red-300
                    {% elif log.level == 'SUCCESS' %} border-green-500 bg-green-900/10 text-green-300
                    {% elif log.level == 'TRADE' %} border-yellow-500 bg-yellow-900/10 text-yellow-300
                    {% elif log.level == 'SIGNAL' %} border-purple-500 bg-purple-900/10 text-purple-300
                    {% else %} border-gray-600 text-gray-400 {% endif %}">
                    
                    <span class="text-xs text-gray-600 w-32 shrink-0">{{ log.timestamp }}</span>
                    
                    <span class="text-xs font-bold w-16 shrink-0 
                        {% if log.level == 'ERROR' %} text-red-500
                        {% elif log.level == 'SUCCESS' %} text-green-500
                        {% elif log.level == 'TRADE' %} text-yellow-500
                        {% elif log.level == 'SIGNAL' %} text-purple-500
                        {% else %} text-gray-500 {% endif %}">
                        {{ log.level }}
                    </span>
                    
                    <span class="text-sm">{{ log.message }}</span>
                </div>
                {% endfor %}
            {% else %}
                <div class="text-center text-gray-600 py-10">
                    <p>No logs yet. The scanner might be sleeping or starting up.</p>
                </div>
            {% endif %}
        </div>
    </div>

</body>
</html>
