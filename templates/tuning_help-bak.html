<!-- templates/tuning.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AiMN V3.1 - Strategy Tuner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@500&display=swap');
        body { background-color: #020617; color: #e2e8f0; font-family: 'Inter', sans-serif; transition: background-color 0.5s ease; overflow-x: hidden; }
        input, select, textarea { background-color: #0f172a; border: 1px solid #334155; color: white; padding: 10px; border-radius: 8px; width: 100%; font-weight: bold; font-size: 0.85rem; }
        input:focus, select:focus, textarea:focus { border-color: #818cf8; outline: none; box-shadow: 0 0 15px rgba(129, 140, 248, 0.2); }
        label { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; color: #64748b; margin-bottom: 4px; display: block; letter-spacing: 0.05em; }
        .section-title { color: #94a3b8; font-weight: 900; border-bottom: 1px solid #1e293b; padding-bottom: 8px; margin-bottom: 20px; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.1em; }
        .glass-card { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .history-table { width: 100%; font-size: 0.75rem; text-align: left; }
        .history-table td { padding: 12px 8px; border-bottom: 1px solid #0f172a; }
        .history-row:hover { background: rgba(255,255,255,0.02); }
    </style>
</head>
<body class="min-h-screen flex flex-col">

<nav class="bg-slate-950 border-b border-slate-800 px-6 py-3 flex items-center justify-between sticky top-0 z-[500] shrink-0 shadow-2xl">
    <div class="flex items-center gap-6 text-sm font-bold uppercase tracking-tighter">
        <a href="/" class="text-gray-400 hover:text-white transition-colors">Dashboard</a>
        <a href="/tuning" class="text-indigo-400 border-b-2 border-indigo-500 pb-1">Tuning</a>
        <a href="/orders" class="text-gray-400 hover:text-white transition-colors">Orders</a>
        <a href="/symbols" class="text-gray-400 hover:text-white transition-colors">Symbols</a>
        <a href="/add_broker" class="text-indigo-400 hover:text-white transition-colors border border-indigo-500/20 px-3 py-1 rounded-lg bg-indigo-500/5 font-black">
            <i class="fas fa-university"></i> Brokers
        </a>
        <a href="/tuning_help" class="text-rose-400 hover:text-white transition-colors font-black border-l border-white/5 pl-4">
            <i class="fas fa-question-circle"></i> Help
        </a>
    </div>
    <div class="text-[10px] text-slate-600 font-mono tracking-widest uppercase">Master Sync Protocol</div>
</nav>

<div class="max-w-7xl mx-auto px-6 pb-12 w-full mt-8 flex-grow">
    
    <!-- TRADINGVIEW BRIDGE -->
    <div class="glass-card rounded-2xl p-6 mb-8 shadow-2xl border-indigo-500/20">
        <div class="flex items-center gap-2 mb-4">
            <i class="fas fa-sync-alt text-indigo-400"></i>
            <h2 class="text-xs font-black uppercase text-slate-400 tracking-widest">TradingView Bridge (V3.1 Full Sync)</h2>
        </div>
        <textarea id="csv_input" class="h-24 bg-black/40 border-slate-800 font-mono text-emerald-400 text-xs mb-4 custom-scrollbar" placeholder="Paste AImn-G V31 String (e.g. BUY, 4, 8, 15...)"></textarea>
        <button onclick="parseCSV()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-black py-3 rounded-xl uppercase text-[10px] tracking-widest transition-all shadow-lg">Auto-Fill All 18 Fields</button>
    </div>

    <!-- MAIN TUNING FORM -->
    <form id="tuningForm" class="glass-card rounded-2xl p-8 shadow-2xl" onsubmit="return false;">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-10 pb-10 border-b border-white/5">
            <div>
                <label>1. Target Broker</label>
                <select id="broker_select" onchange="filterSymbols()">
                    <option value="">-- All Gateways --</option>
                    {% for b in brokers %}
                    <option value="{{ b.id }}">{{ b.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label>2. Asset Symbol</label>
                <select id="broker_product_id" name="broker_product_id" onchange="loadHistory()">
                    <option value="" id="symbol_placeholder">-- Choose Symbol --</option>
                </select>
            </div>
            <div>
                <label>3. Execution Bias</label>
                <select id="direction_select" name="direction" onchange="loadHistory()">
                    <option value="LONG">🟢 LONG</option>
                    <option value="SHORT">🔴 SHORT</option>
                </select>
            </div>
            <div class="flex items-end gap-2">
                <button type="button" onclick="loadHistory()" class="w-full bg-slate-800 hover:bg-slate-700 text-white py-3 rounded-xl font-black uppercase text-[10px]">LOAD PROFILE</button>
                <button type="button" onclick="saveTuning()" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-3 rounded-xl font-black transition uppercase text-[10px] shadow-xl">SAVE</button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-12">
            <div>
                <div class="section-title text-indigo-400">Indicators</div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="col-span-2"><label>RSI Lookback</label><input type="number" id="rsi_len" value="14"></div>
                    <div><label>MACD Fast</label><input type="number" id="macd_fast" value="12"></div>
                    <div><label>MACD Slow</label><input type="number" id="macd_slow" value="26"></div>
                    <div class="col-span-2"><label>MACD Signal</label><input type="number" id="macd_sig" value="9"></div>
                    <div><label>RSI Entry</label><input type="number" step="0.01" id="rsi_entry" value="30"></div>
                    <div><label>RSI Exit</label><input type="number" step="0.01" id="rsi_exit" value="70"></div>
                </div>
            </div>
            <div>
                <div class="section-title text-emerald-400">Risk Management</div>
                <div class="grid grid-cols-2 gap-4">
                    <div><label>Stop Loss %</label><input type="number" step="0.01" id="stop_loss" value="2"></div>
                    <div><label>Take Profit %</label><input type="number" step="0.01" id="take_profit" value="5"></div>
                    <div><label>Trail Start %</label><input type="number" step="0.01" id="trail_start" value="1"></div>
                    <div><label>Trail Drop %</label><input type="number" step="0.01" id="trail_drop" value="0.5"></div>
                    <div><label>Decay (H)</label><input type="number" step="0.1" id="decay_start" value="24"></div>
                    <div><label>Decay %</label><input type="number" step="0.01" id="decay_rate" value="0.1"></div>
                </div>
            </div>
            <div>
                <div class="section-title text-amber-400">Optimization Math</div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="col-span-2"><label>Historical Max (Scale)</label><input type="text" id="rsi_real_max" value="0.00"></div>
                    <div class="col-span-2"><label>Historical Min (Scale)</label><input type="text" id="rsi_real_min" value="0.00"></div>
                    <div><label>Expected P&L %</label><input type="number" step="0.01" id="pl_pct" value="0.00"></div>
                    <div><label>Expected P&L $ (pl_amount)</label><input type="number" step="0.01" id="pl_amount" value="0.00"></div>
                    <div><label>Candle Time (Index Key)</label><input type="text" id="candle_time" value="2h" onchange="loadHistory()"></div>
                    <div><label>History Bars</label><input type="number" id="bar_count" value="36"></div>
                </div>
            </div>
        </div>
    </form>

    <div class="glass-card rounded-2xl p-8 mt-8 shadow-2xl border-white/5">
        <h3 class="text-[11px] font-black uppercase text-slate-300 tracking-widest mb-6 italic">History Archive</h3>
        <div class="overflow-x-auto custom-scrollbar">
            <table class="history-table">
                <thead>
                    <tr class="text-[10px] font-black uppercase text-slate-500">
                        <th>Date</th><th>Dir</th><th>Time</th><th>Goals</th><th>P&L %</th><th>P&L $</th><th>Action</th>
                    </tr>
                </thead>
                <tbody id="history_body"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const getEl = (id) => document.getElementById(id);
    let historyData = [];

    function parseCSV() {
        let rawInput = getEl('csv_input').value.trim();
        if (!rawInput) return;
        let input = rawInput;
        if (input.includes('(')) input = input.split('(')[1].split(')')[0];
        const p = input.split(', ').map(s => s.trim().replace(/,/g, ''));
        const stitch = (i, j) => (parseFloat(p[i] || 0) + parseFloat(p[j] || 0)).toFixed(2);
        try {
            getEl('direction_select').value = p[0].includes("SELL") ? "SHORT" : "LONG";
            getEl('macd_fast').value = p[1]; getEl('macd_slow').value = p[2]; getEl('macd_sig').value = p[3];
            getEl('rsi_len').value = p[4]; getEl('rsi_entry').value = stitch(5, 6); getEl('rsi_exit').value = stitch(7, 8);
            getEl('stop_loss').value = stitch(9, 10); getEl('trail_start').value = stitch(11, 12);
            getEl('trail_drop').value = stitch(13, 14); getEl('take_profit').value = stitch(15, 16);
            getEl('decay_start').value = stitch(17, 18); getEl('decay_rate').value = stitch(19, 20);
            getEl('rsi_real_max').value = p[21] || "0.00"; getEl('rsi_real_min').value = p[22] || "0.00";
            alert("✅ V3.1 Sync Complete.");
        } catch (e) { alert("❌ Format Error."); }
    }

    async function saveTuning() {
        const pId = getEl('broker_product_id').value;
        if (!pId) { alert("Select Symbol first!"); return; }
        const payload = {
            broker_product_id: pId, 
            direction: getEl('direction_select').value,
            rsi_len: getEl('rsi_len').value, 
            rsi_entry: getEl('rsi_entry').value, 
            rsi_exit: getEl('rsi_exit').value,
            macd_fast: getEl('macd_fast').value, 
            macd_slow: getEl('macd_slow').value, 
            macd_sig: getEl('macd_sig').value,
            stop_loss: getEl('stop_loss').value, 
            take_profit: getEl('take_profit').value,
            trailing_start: getEl('trail_start').value, 
            trailing_drop: getEl('trail_drop').value,
            decay_start: getEl('decay_start').value, 
            decay_rate: getEl('decay_rate').value,
            rsi_real_max: getEl('rsi_real_max').value.replace(/,/g, ''), 
            rsi_real_min: getEl('rsi_real_min').value.replace(/,/g, ''),
            pl_pct: getEl('pl_pct').value, 
            pl_amount: getEl('pl_amount').value,
            candle_time: getEl('candle_time').value, 
            bar_count: getEl('bar_count').value,
            active: 1, 
            csv_string: getEl('csv_input').value 
        };
        try {
            const res = await fetch('/save_tuning', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
            const d = await res.json();
            if (d.status === "success") alert("✅ Strategy Locked for " + payload.candle_time + ".");
            else alert("❌ Sync Failed: " + d.message);
        } catch (e) { alert("❌ Network Error."); }
    }

    async function loadHistory() {
        const pId = getEl('broker_product_id').value;
        const dir = getEl('direction_select').value;
        const cTime = getEl('candle_time').value; // Grab candle time for the expanded search index
        
        if (!pId) return;
        try {
            // Updated fetch to include candle_time in the query
            const res = await fetch(`/load_tuning_data?product_id=${pId}&direction=${dir}&candle_time=${encodeURIComponent(cTime)}`);
            const data = await res.json();
            if (data.status === "success" && data.history && data.history.length > 0) {
                historyData = data.history;
                restoreHistoryRecord(0, false);
                getEl('history_body').innerHTML = data.history.map((h, i) => `
                    <tr class="history-row">
                        <td class="text-slate-500 font-mono text-[10px]">${new Date(h.last_tuned).toLocaleString()}</td>
                        <td class="font-black text-white uppercase text-[10px]">${h.direction}</td>
                        <td class="text-indigo-400 font-black text-[10px] uppercase">${h.candle_time || '---'}</td>
                        <td class="text-slate-400 font-bold">${h.rsi_entry}/${h.rsi_exit}</td>
                        <td class="font-black text-emerald-400">${parseFloat(h.pl_pct || 0).toFixed(2)}%</td>
                        <td class="font-black text-slate-200">$${parseFloat(h.pl_amount || 0).toFixed(2)}</td>
                        <td><button onclick='restoreHistoryRecord(${i})' class="bg-slate-800 hover:bg-indigo-600 text-white px-3 py-1 rounded text-[9px] font-black">RESTORE</button></td>
                    </tr>`).join('');
            } else {
                getEl('history_body').innerHTML = '<tr><td colspan="7" class="text-center py-10 opacity-20 italic font-black uppercase text-[10px]">No matches for this Asset/Bias/Timeframe combination.</td></tr>';
            }
        } catch (e) {}
    }

    function restoreHistoryRecord(index, showAlert = true) {
        const h = historyData[index];
        if(!h) return;
        const map = (id, val) => { const el = getEl(id); if(el) el.value = (val !== undefined && val !== null) ? val : ""; };
        map('macd_fast', h.macd_fast); map('macd_slow', h.macd_slow); map('macd_sig', h.macd_sig);
        map('rsi_len', h.rsi_len); map('rsi_entry', h.rsi_entry); map('rsi_exit', h.rsi_exit);
        map('stop_loss', h.stop_loss); map('take_profit', h.take_profit);
        map('trail_start', h.trailing_start); map('trail_drop', h.trailing_drop);
        map('decay_start', h.decay_start); map('decay_rate', h.decay_rate);
        map('rsi_real_max', h.rsi_real_max); map('rsi_real_min', h.rsi_real_min);
        map('pl_amount', h.pl_amount); map('pl_pct', h.pl_pct); 
        map('candle_time', h.candle_time || "1m"); map('bar_count', h.bar_count || 36);
        if (h.csv_string) getEl('csv_input').value = h.csv_string;
        if(showAlert) alert("✅ Profile Restored for " + (h.candle_time || '1m') + ".");
    }

    function filterSymbols() {
        const bId = String(getEl('broker_select').value);
        const options = getEl('broker_product_id').options;
        for (let i = 0; i < options.length; i++) {
            const optB = String(options[i].getAttribute('data-broker'));
            if (options[i].id === "symbol_placeholder") continue;
            options[i].style.display = !bId || optB === bId ? "block" : "none";
        }
    }

    window.onload = async () => {
        try {
            const sRes = await fetch('/get_all_symbols_api');
            const data = await sRes.json();
            const select = getEl('broker_product_id');
            if (data && Array.isArray(data)) {
                data.forEach(s => {
                    const opt = document.createElement('option');
                    opt.value = s.id;
                    opt.text = s.symbol;
                    opt.setAttribute('data-broker', s.broker_id);
                    select.appendChild(opt);
                });
            }
        } catch(e) {}
    };
</script>
</body>
</html>
