<!-- templates/aiml/aiml_base.html -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AIML Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #111;
            color: #eee;
        }
        .navbar {
            background: #222;
            padding: 14px;
            display: flex;
            gap: 20px;
        }
        .navbar a {
            color: #6cd4ff;
            text-decoration: none;
            font-size: 16px;
        }
        .navbar a:hover {
            color: #fff;
        }
        .content {
            padding: 25px;
        }
    </style>
</head>

<body>

<div class="navbar">
    <a href="/aiml">AI/ML Home</a>
    <a href="/aiml/manual-tune">Manual Tuning</a>
    <a href="/">Main Dashboard</a>
</div>


<div class="content">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
