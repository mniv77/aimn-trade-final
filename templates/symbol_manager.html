<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Symbol Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-10 font-mono">

    <div class="max-w-2xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-blue-400">🎛️ Scanner Symbol Manager</h1>
            <a href="/scanner" class="bg-gray-700 px-4 py-2 rounded hover:bg-gray-600">Back to Scanner</a>
        </div>

        <div class="bg-gray-800 p-6 rounded-lg border border-gray-700 mb-8 shadow-xl">
            <h2 class="text-xl font-bold mb-4">Add New Symbol</h2>
            <div class="flex gap-4">
                <input id="newSym" type="text" placeholder="Symbol (e.g. BTC/USD)" class="bg-black text-white p-3 rounded w-full border border-gray-600 uppercase">
                
                <select id="newEx" class="bg-black text-white p-3 rounded border border-gray-600">
                    <option value="CRYPTO">CRYPTO</option>
                    <option value="ALPACA">ALPACA</option>
                    <option value="NYSE">NYSE</option>
                    <option value="FUTURES">FUTURES</option>
                </select>
                
                <button onclick="addSymbol()" class="bg-green-600 hover:bg-green-500 text-white px-6 py-3 rounded font-bold">ADD</button>
            </div>
        </div>

        <div class="bg-gray-800 rounded-lg border border-gray-700 overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-gray-900 text-gray-400 uppercase text-xs">
                    <tr>
                        <th class="p-4">Symbol</th>
                        <th class="p-4">Exchange</th>
                        <th class="p-4 text-right">Action</th>
                    </tr>
                </thead>
                <tbody id="symList" class="divide-y divide-gray-700">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        async function loadSymbols() {
            const res = await fetch('/api/get_symbols');
            const data = await res.json();
            const list = document.getElementById('symList');
            list.innerHTML = '';
            
            data.forEach(s => {
                list.innerHTML += `
                    <tr class="hover:bg-gray-700 transition">
                        <td class="p-4 font-bold text-lg">${s.symbol}</td>
                        <td class="p-4 text-blue-400 font-bold">${s.exchange}</td>
                        <td class="p-4 text-right">
                            <button onclick="deleteSymbol(${s.id})" class="text-red-500 hover:text-red-400 font-bold border border-red-900 px-3 py-1 rounded">DELETE</button>
                        </td>
                    </tr>
                `;
            });
        }

        async function addSymbol() {
            const sym = document.getElementById('newSym').value.toUpperCase();
            const ex = document.getElementById('newEx').value;
            if(!sym) return;

            await fetch('/api/add_symbol', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ symbol: sym, exchange: ex })
            });
            document.getElementById('newSym').value = '';
            loadSymbols();
        }

        async function deleteSymbol(id) {
            if(!confirm("Remove this symbol?")) return;
            await fetch('/api/delete_symbol', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ id: id })
            });
            loadSymbols();
        }

        loadSymbols();
    </script>
</body>
</html>
